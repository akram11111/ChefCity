name: Build Flet APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install Flet and Setup
        run: |
          pip install "flet[cli]"

      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'

      - name: Build Android APK via Flet
        run: |
           echo "y" | flet build apk
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: ChefCity-App
          path: build/apk/*.apk
